# Sync from upstream openai/codex every hour.
# - Syncs main branch via PR (auto-merge if CI passes)
# - Detects new upstream tags and auto-tags with .0 suffix after merge

name: upstream-sync
on:
  schedule:
    - cron: "0 * * * *"  # every hour
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/openai/codex.git || true
          git fetch upstream main --tags

      - name: Check if sync needed
        id: check
        run: |
          # Check if upstream main has commits not in our main
          MERGE_BASE=$(git merge-base HEAD upstream/main)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$MERGE_BASE" = "$UPSTREAM" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already up to date with upstream"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create/update sync branch
        if: steps.check.outputs.skip != 'true'
        id: merge
        run: |
          set -euo pipefail
          BRANCH="upstream-sync"
          git checkout -B "$BRANCH" origin/main

          if git merge upstream/main --no-edit; then
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          else
            git add -A
            git commit --no-edit || true
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          fi

          git push -f origin "$BRANCH"

      - name: Create or update PR
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          UPSTREAM_SHORT="${UPSTREAM_SHA:0:7}"
          CONFLICT="${{ steps.merge.outputs.conflict }}"

          if [ "$CONFLICT" = "true" ]; then
            TITLE="[CONFLICT] Upstream sync ${UPSTREAM_SHORT}"
          else
            TITLE="Upstream sync ${UPSTREAM_SHORT}"
          fi

          if [ "$CONFLICT" = "true" ]; then
            CONFLICT_MSG="**Merge conflicts detected.** Manual resolution required."
          else
            CONFLICT_MSG="Clean merge. Will auto-merge if CI passes."
          fi

          BODY=$(printf "Automated sync from upstream openai/codex.\nUpstream HEAD: https://github.com/openai/codex/commit/%s\n\n%s" "$UPSTREAM_SHA" "$CONFLICT_MSG")

          # Check for existing open PR on this branch
          EXISTING=$(gh pr list --repo "$REPO" --head "upstream-sync" --state open --json number --jq '.[0].number // empty' 2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --repo "$REPO" --title "$TITLE" --body "$BODY" || true
            echo "Updated existing PR #${EXISTING}"
            PR_NUM="$EXISTING"
          else
            # Use GitHub API directly to create PR (avoids checkout token interference)
            PR_NUM=$(gh api repos/"$REPO"/pulls \
              -f title="$TITLE" \
              -f body="$BODY" \
              -f head="upstream-sync" \
              -f base="main" \
              --jq '.number' 2>&1) || { echo "PR create failed: $PR_NUM"; PR_NUM=""; }
            echo "Created PR #${PR_NUM}"
          fi

          # Auto-merge if no conflicts
          if [ "$CONFLICT" != "true" ] && [ -n "$PR_NUM" ]; then
            gh pr merge "$PR_NUM" --repo "$REPO" --auto --merge || true
          fi

  sync-tags:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream tags
        run: |
          git remote add upstream https://github.com/openai/codex.git || true
          git fetch upstream --tags

      - name: Detect and create fork tags
        run: |
          set -euo pipefail

          # Get upstream release tags - filter to sane semver (each segment <= 4 digits)
          UPSTREAM_TAGS=$(git tag -l 'rust-v*' \
            | grep -E '^rust-v[0-9]{1,4}\.[0-9]{1,4}\.[0-9]{1,4}$' \
            | sort -V)

          for TAG in $UPSTREAM_TAGS; do
            FORK_TAG="${TAG}.0"
            # Check if we already have this fork tag
            if git rev-parse "$FORK_TAG" >/dev/null 2>&1; then
              continue
            fi

            # Check if the upstream tag commit is an ancestor of our main
            TAG_COMMIT=$(git rev-parse "$TAG^{commit}")
            if git merge-base --is-ancestor "$TAG_COMMIT" origin/main 2>/dev/null; then
              echo "Creating fork tag $FORK_TAG at origin/main HEAD"
              # Tag at main HEAD (not upstream commit) so release includes fork patches
              MAIN_HEAD=$(git rev-parse origin/main)
              git tag "$FORK_TAG" "$MAIN_HEAD"
              git push origin "$FORK_TAG" || echo "Failed to push tag $FORK_TAG, skipping"
            else
              echo "Upstream tag $TAG not yet merged into main, skipping $FORK_TAG"
            fi
          done
